# ===== 서버 설정 =====
spring.application.name=backend
server.port=8080

# ===== MySQL 데이터베이스 =====
spring.datasource.url=jdbc:mysql://localhost:3307/cleanmatching?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
jwt.secret=cleanmatching-super-secret-key-2024-must-be-at-least-256bits-long
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000

# ===== 파일 업로드 =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# ===== OpenAI =====
openai.api-key=${OPENAI_API_KEY:your-api-key-here}
openai.model=gpt-4o-mini

# ===== 로깅 =====
logging.level.com.cleanmatching=DEBUG
logging.level.org.springframework.security=DEBUG
